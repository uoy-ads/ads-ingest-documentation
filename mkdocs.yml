    - Discovery Metadata: nc/nc_discovery.md
    - Related Resources: nc/nc_related.md
    - People & Organisations: nc/nc_people.md
    - Files: nc/nc_files.md
    - Costs: nc/nc_costs.md
    - Invoice Details: nc/nc_invoice.md
  - Core Metadata Template:
    - cmt/cmt_index.md
    - Template Download: cmt/cmt_template_download.md
    - Field Guidelines: cmt/cmt_field_guidelines.md
    - Multiple Files: cmt/cmt_multiple.md
    - Data Category: cmt/cmt_data_category.md
