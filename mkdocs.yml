site_name: Guidance
site_url: https://uoy-ads.github.io/ads-ingest-documentation/
theme:
  name: material
  custom_dir: overrides
  font:
    text: Poppins
    code: Poppins
  logo: assets/Ingest_logo2.png
  favicon: assets/Ingest_favicon_circle.png
  features:
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top


extra_css:
  - stylesheets/extra.css

watch:
  - overrides

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - md_in_html
  - pymdownx.blocks.caption


copyright: Copyright &copy; 2026 - Archaeology Data Service

# Page tree
nav:
